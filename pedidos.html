<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pedidos · Adoquines Modulares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0e12;--ink2:#1c1e28;--ink3:#2a2d3e;--brd:#353849;--muted:#6b7090;
  --fog:#a0a5c0;--paper:#f0f1f5;--amber:#f59e0b;--amber2:#d97706;--green:#22c55e;
  --red:#ef4444;--blue:#60a5fa;--teal:#2dd4bf;
  --r:8px;--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
html{-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--paper);font-family:var(--fb);font-size:14px;min-height:100dvh}
.topbar{background:var(--ink2);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;position:sticky;top:0;z-index:100}
.top-date{font-family:var(--fm);font-size:13px;color:var(--amber);font-weight:500;text-align:right}
.top-day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;text-align:right}
.nav-bar{display:flex;gap:8px;padding:10px 16px;background:var(--ink2);border-bottom:1px solid var(--brd);overflow-x:auto}
.nav-pill{font-family:var(--fm);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--brd);padding:5px 12px;border-radius:99px;white-space:nowrap}
.nav-pill.active{color:var(--amber);border-color:var(--amber);background:rgba(245,158,11,.08)}
.content{padding:16px;max-width:560px;margin:0 auto}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sec-title{font-family:var(--fd);font-size:16px;font-weight:800}
.sec-count{font-family:var(--fm);font-size:10px;color:var(--muted);border:1px solid var(--brd);padding:3px 9px;border-radius:99px}
.panel{background:var(--ink2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.ph{padding:10px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.02)}
.ph-t{font-family:var(--fm);font-size:10px;font-weight:500;color:var(--fog);text-transform:uppercase;letter-spacing:1px}
.pb{padding:16px}
label{display:block;font-family:var(--fm);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
input,textarea{width:100%;background:var(--ink3);border:1.5px solid var(--brd);border-radius:var(--r);color:var(--paper);font-family:var(--fb);font-size:15px;padding:10px 12px;outline:none;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--amber)}
.frow{margin-bottom:14px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.btn{width:100%;background:linear-gradient(135deg,var(--amber),var(--amber2));border:none;border-radius:var(--r);color:#000;font-family:var(--fb);font-size:14px;font-weight:700;padding:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5}
.card{background:var(--ink2);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.badge{display:inline-block;font-family:var(--fm);font-size:9px;font-weight:500;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px}
.b-abierto{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.b-parcial{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.b-cerrado{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.b-anulado{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.bar{height:6px;background:var(--ink3);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:var(--green);transition:width .3s}
.mini-btn{background:transparent;border:1px solid var(--brd);color:var(--muted);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--fm)}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px;font-family:var(--fm);background:var(--ink2);border:1px solid var(--brd);border-radius:var(--r)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink3);border:1px solid var(--brd);border-radius:99px;padding:9px 18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="topbar">
  <svg width="110" height="38" viewBox="0 0 110 38" xmlns="http://www.w3.org/2000/svg">
    <rect width="110" height="38" rx="4" fill="#111"/>
    <text x="7" y="17" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="13" fill="#F5A623" letter-spacing="1">ADOQUINES</text>
    <text x="7" y="31" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="13" fill="#FFFFFF" letter-spacing="1">MODULARES</text>
  </svg>
  <div>
    <div class="top-date" id="topDate">—</div>
    <div class="top-day" id="topDay">—</div>
  </div>
</div>
<div class="nav-bar">
  <a class="nav-pill" href="./admin.html">📊 Dashboard</a>
  <a class="nav-pill" href="./personas.html">👥 Personas</a>
  <a class="nav-pill active" href="#">🧾 Pedidos</a>
  <a class="nav-pill" href="./rendiciones.html">💸 Rendiciones</a>
  <a class="nav-pill" href="./index.html">🎫 Tickets</a>
</div>

<div class="content">
  <!-- NUEVO PEDIDO -->
  <div class="panel">
    <div class="ph"><span>🧾</span><span class="ph-t">Nuevo pedido</span></div>
    <div class="pb">
      <div class="fg2">
        <div><label>Cliente *</label><input type="text" id="pCliente" placeholder="Ej: Constructora Sur"></div>
        <div><label>Teléfono</label><input type="tel" id="pTel" inputmode="tel" placeholder="569…"></div>
      </div>
      <label>Cantidades por modelo (deja en 0 las que no van)</label>
      <div class="fg3" style="margin-top:6px">
        <div><label>🧱 Bloque</label><input type="number" id="pBloque" min="0" inputmode="numeric" placeholder="0"></div>
        <div><label>🔷 Mosaico</label><input type="number" id="pMosaico" min="0" inputmode="numeric" placeholder="0"></div>
        <div><label>➖ Hilera</label><input type="number" id="pHilera" min="0" inputmode="numeric" placeholder="0"></div>
      </div>
      <div class="frow"><label>Nota (opcional)</label><textarea id="pNota" rows="2" placeholder="Ej: retira parcializado, obra Pudahuel…"></textarea></div>
      <button class="btn" id="btnCrear" onclick="crearPedido()">✓ Crear Pedido</button>
    </div>
  </div>

  <!-- LISTA -->
  <div class="sec-head">
    <div class="sec-title">📋 Pedidos</div>
    <span class="sec-count" id="countPed">—</span>
  </div>
  <div id="pedWrap"><div class="empty">Cargando pedidos…</div></div>
</div>

<div id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbytgwJFhpJCcFaztevt2WG5QItLE4mlO_pVv8ax0dJ6x8oOBCc_IyIQlcVl6Vio-k2_cQ/exec';
const APP_TOKEN  = 'fp-adoq-2026';

// ─── PIN (mismo que dashboard) ───
const ADMIN_PIN = '2026';
(function(){
  if (sessionStorage.getItem('fp_admin_ok') === '1') return;
  for (let i=0;i<3;i++){
    const p = prompt('🔒 Módulo Pedidos\n\nIngresa el PIN de acceso:');
    if (p === ADMIN_PIN){ sessionStorage.setItem('fp_admin_ok','1'); return; }
    if (p === null) break;
  }
  document.documentElement.innerHTML='<body style="background:#0d0e12;color:#a0a5c0;font-family:sans-serif;display:grid;place-items:center;height:100vh"><div style="text-align:center"><div style="font-size:40px">🔒</div><p>Acceso denegado</p></div></body>';
  throw new Error('PIN incorrecto');
})();

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',3500); }
const MOD_EMOJI={Bloque:'🧱',Mosaico:'🔷',Hilera:'➖'};

async function crearPedido(){
  const cliente=document.getElementById('pCliente').value.trim();
  const items=[
    {modelo:'Bloque',  cantidad:parseInt(document.getElementById('pBloque').value)||0},
    {modelo:'Mosaico', cantidad:parseInt(document.getElementById('pMosaico').value)||0},
    {modelo:'Hilera',  cantidad:parseInt(document.getElementById('pHilera').value)||0},
  ].filter(it=>it.cantidad>0);
  if(!cliente){ showToast('Ingresa el cliente'); return; }
  if(!items.length){ showToast('Ingresa al menos una cantidad'); return; }
  const btn=document.getElementById('btnCrear');
  btn.disabled=true; btn.textContent='⏳ Creando…';
  try{
    const res=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({
      tipo:'pedido', token:APP_TOKEN, cliente,
      tel:document.getElementById('pTel').value.trim(),
      nota:document.getElementById('pNota').value.trim(), items,
    })});
    const d=await res.json();
    if(d.ok){
      showToast('✓ Pedido '+d.id+' creado');
      ['pCliente','pTel','pBloque','pMosaico','pHilera','pNota'].forEach(id=>document.getElementById(id).value='');
      cargarPedidos();
    } else showToast('Error: '+(d.mensaje||'no se pudo crear'));
  }catch(e){ showToast('Sin conexión — intenta de nuevo'); }
  btn.disabled=false; btn.textContent='✓ Crear Pedido';
}

async function cargarPedidos(){
  const wrap=document.getElementById('pedWrap');
  try{
    const res=await fetch(`${SHEETS_URL}?action=pedidos`);
    const d=await res.json();
    if(!d.ok) throw new Error(d.mensaje||'error');
    const peds=d.pedidos||[];
    const activos=peds.filter(p=>p.estado==='Abierto'||p.estado==='Parcial');
    document.getElementById('countPed').textContent=activos.length?`${activos.length} activo${activos.length!==1?'s':''}`:'sin pendientes';
    if(!peds.length){ wrap.innerHTML='<div class="empty">Sin pedidos aún — crea el primero arriba</div>'; return; }
    const B={Abierto:'b-abierto',Parcial:'b-parcial',Cerrado:'b-cerrado',Anulado:'b-anulado'};
    wrap.innerHTML=peds.slice(0,25).map(p=>{
      const tot=p.items.reduce((s,it)=>s+it.cantidad,0);
      const desp=p.items.reduce((s,it)=>s+Math.min(it.despachado,it.cantidad),0);
      const pct=tot?Math.round(desp/tot*100):0;
      const idSafe=p.id.replace(/'/g,"\\'");
      const itemsHtml=p.items.map(it=>{
        const saldo=Math.max(0,it.cantidad-it.despachado);
        return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
          <span>${MOD_EMOJI[it.modelo]||'📦'} ${esc(it.modelo)}</span>
          <span style="font-family:var(--fm);color:${saldo?'var(--fog)':'var(--green)'}">${it.despachado.toLocaleString('es-CL')} / ${it.cantidad.toLocaleString('es-CL')}${saldo?` · faltan ${saldo.toLocaleString('es-CL')}`:' ✓'}</span>
        </div>`;
      }).join('');
      const acciones=(p.estado==='Abierto'||p.estado==='Parcial')
        ? `<div style="display:flex;gap:6px;margin-top:8px">
            <button class="mini-btn" style="color:var(--green);border-color:rgba(34,197,94,.4)" onclick="cambiarEstado('${idSafe}','Cerrado')">✓ Cerrar</button>
            <button class="mini-btn" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="cambiarEstado('${idSafe}','Anulado')">✕ Anular</button>
          </div>`:'';
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600;font-size:14px">${esc(p.cliente)}</div>
            <div style="font-size:10px;color:var(--muted);font-family:var(--fm);margin-top:2px">${esc(p.id)} · ${esc(p.fecha)}${p.nota?' · '+esc(p.nota):''}</div>
          </div>
          <span class="badge ${B[p.estado]||'b-abierto'}">${esc(p.estado)}</span>
        </div>
        <div style="margin-top:8px">${itemsHtml}</div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--fm);margin-top:3px">${pct}% despachado</div>
        ${acciones}
      </div>`;
    }).join('');
  }catch(e){
    wrap.innerHTML='<div class="empty">⚠️ No se pudieron cargar los pedidos<br><span style="font-size:10px">requiere backend v10 publicado</span></div>';
  }
}

async function cambiarEstado(id,estado){
  if(!confirm(`¿${estado==='Cerrado'?'Cerrar':'Anular'} el pedido ${id}?`)) return;
  try{
    const res=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({tipo:'pedido_estado',id,estado,token:APP_TOKEN})});
    const d=await res.json();
    if(d.ok){ showToast('✓ Pedido '+estado.toLowerCase()); cargarPedidos(); }
    else showToast('Error: '+(d.mensaje||'no se pudo actualizar'));
  }catch(e){ showToast('Error de conexión'); }
}

(function(){
  const now=new Date();
  const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const D=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  document.getElementById('topDate').textContent=`${now.getDate()} ${M[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('topDay').textContent=D[now.getDay()];
  cargarPedidos();
  setInterval(cargarPedidos,5*60*1000);
})();
</script>
</body>
</html>
